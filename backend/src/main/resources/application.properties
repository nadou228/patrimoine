# -------------------------------
# 0. Port du serveur
# -------------------------------
server.port=8082

# -------------------------------
# 1. Configuration de la base (H2 In-Memory)
# -------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/patrisdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# -------------------------------
# 2. JPA / Hibernate
# -------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------
# 3. Serveur Spring Boot
# -------------------------------
server.port=8082
server.address=0.0.0.0
  
# -------------------------------
# 4. Logging
# -------------------------------
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.patris=DEBUG

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# -------------------------------
# 8. Flyway (désactivé pour H2)
# -------------------------------
spring.flyway.enabled=false

# -------------------------------
# 9. H2 Console (Development only)
# -------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true

# -------------------------------
# 10. Seed default user
# -------------------------------
app.seed.default-user=true

# -------------------------------
# 5. Sécurité (optionnel)
# -------------------------------
jwt.secret=${JWT_SECRET:change_this_secret_for_prod_very_long_random_string_minimum_32_chars}
jwt.expiration-ms=604800000

# -------------------------------
# 6. IUP
# -------------------------------
iup.prefix=CT-LME

# -------------------------------
# 7. Upload configuration
# -------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
spring.mvc.cors.allowed-origins=http://localhost:5173

# -------------------------------
# 9. PRA / Sauvegarde automatique (désactivée pour H2)
# -------------------------------
# Dossier de stockage des sauvegardes (modifiez selon votre serveur)
app.backup.path=D:/patrimoine_backups
# Chemin vers pg_dump (si non dans le PATH système, ex: C:/Program Files/PostgreSQL/16/bin/pg_dump)
app.backup.pgdump.path=pg_dump
# Activer/désactiver les crons automatiques
app.backup.enabled=false
